<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pupil Core Markers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; background: #808080; overflow: hidden; }
        img {
            position: fixed;
            width: 100px;
            height: 100px;
            z-index: 9999;
            image-rendering: pixelated;
        }
        .tl { top: 0; left: 0; }
        .tr { top: 0; right: 0; }
        .bl { bottom: 0; left: 0; }
        .br { bottom: 0; right: 0; }
    </style>
</head>
<body>
    <img class="tl" src="stimuli/markers/marker_0.png" alt="">
    <img class="tr" src="stimuli/markers/marker_1.png" alt="">
    <img class="bl" src="stimuli/markers/marker_2.png" alt="">
    <img class="br" src="stimuli/markers/marker_3.png" alt="">
</body>
</html>
